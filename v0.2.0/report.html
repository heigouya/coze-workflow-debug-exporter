<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coze 工作流调试报告</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="title-block">
        <h1>Coze 工作流调试报告</h1>
        <p class="muted">本页展示插件在本机捕获到的 Coze 试运行接口数据。</p>
      </div>
      <div class="actions">
        <label class="toggle">
          <input id="redact" type="checkbox" checked />
          复制时脱敏
        </label>
        <button id="copy-all" class="primary">一键复制全部</button>
        <button id="refresh" class="secondary">刷新</button>
        <button id="clear-local" class="ghost">清空本地缓存</button>
      </div>
    </header>

    <section class="toolbar">
      <label class="run-picker">
        <span class="toolbar-label">运行记录</span>
        <select id="run-select"></select>
      </label>
      <span id="summary" class="muted"></span>
      <div id="density-switch" class="density-switch" role="group" aria-label="布局密度">
        <button type="button" data-density="compact">紧凑</button>
        <button type="button" data-density="default">默认</button>
        <button type="button" data-density="loose">宽松</button>
      </div>
    </section>

    <main id="content" class="gallery"></main>

    <template id="node-card-template">
      <article class="node-card" tabindex="0" role="button" aria-label="查看节点详情">
        <header class="card-head">
          <span class="card-index"></span>
          <h2 class="card-title"></h2>
          <span class="status-badge"></span>
          <button class="copy-node copy-icon" type="button" aria-label="复制本节点" title="复制本节点">
            <svg aria-hidden="true" viewBox="0 0 1024 1024" focusable="false">
              <path d="M661.333333 234.666667A64 64 0 0 1 725.333333 298.666667v597.333333a64 64 0 0 1-64 64h-469.333333A64 64 0 0 1 128 896V298.666667a64 64 0 0 1 64-64z m-21.333333 85.333333H213.333333v554.666667h426.666667v-554.666667z m191.829333-256a64 64 0 0 1 63.744 57.856l0.256 6.144v575.701333a42.666667 42.666667 0 0 1-85.034666 4.992l-0.298667-4.992V149.333333H384a42.666667 42.666667 0 0 1-42.368-37.674666L341.333333 106.666667a42.666667 42.666667 0 0 1 37.674667-42.368L384 64h447.829333z" fill="currentColor"></path>
            </svg>
          </button>
        </header>
        <div class="card-preview">
          <pre class="json"></pre>
          <span class="preview-fade" aria-hidden="true"></span>
        </div>
        <footer class="card-foot">
          <span class="card-meta"></span>
          <span class="expand-hint">展开 ↗</span>
        </footer>
      </article>
    </template>

    <div id="modal" class="modal" hidden>
      <div class="modal-overlay" data-close></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-nav prev" type="button" aria-label="上一个节点" title="上一个节点">‹</button>
        <button class="modal-nav next" type="button" aria-label="下一个节点" title="下一个节点">›</button>
        <header class="modal-head">
          <div class="modal-title-block">
            <h2 id="modal-title" class="modal-title"></h2>
            <p class="modal-meta"></p>
          </div>
          <button class="modal-close" type="button" data-close aria-label="关闭">✕</button>
        </header>
        <div class="modal-tabs" role="tablist">
          <button type="button" data-tab="all" role="tab">全部</button>
          <button type="button" data-tab="input" role="tab">输入</button>
          <button type="button" data-tab="output" role="tab">输出</button>
          <button type="button" data-tab="error" role="tab">错误</button>
        </div>
        <div class="modal-body"></div>
      </div>
    </div>

    <script src="core.js"></script>
    <script src="report.js"></script>
  </body>
</html>
